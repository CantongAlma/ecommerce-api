<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - Ecommerce API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 500px;
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            margin-bottom: 20px;
        }
        .form-group.full-width {
            width: 100%;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46a0 100%);
        }
        .error {
            background-color: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #fcc;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c8e6c9;
        }
        .hidden {
            display: none;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Create Account</h2>
        
        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>
                
                <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>
            </div>
            
            <div class="form-group full-width">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group full-width">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            
            <div class="form-group full-width">
                <label for="role">Register as *</label>
                <select id="role" name="role">
                    <option value="USER">Customer / Shopper</option>
                    <option value="SELLER">Seller</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            
            <button type="submit">Register</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        // Wait for the DOM to fully load before attaching event listener
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registerForm');
            if (form) {
                form.addEventListener('submit', async function(event) {
                    event.preventDefault();
                    
                    // Hide previous messages
                    document.getElementById('errorMessage').classList.add('hidden');
                    document.getElementById('successMessage').classList.add('hidden');
                    
                    // Get form data
                    const formData = {
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        role: document.getElementById('role').value
                    };
                    
                    try {
                        const response = await fetch('http://localhost:8081/api/v1/auth/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(formData)
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            const successDiv = document.getElementById('successMessage');
                            successDiv.textContent = 'Registration successful! Redirecting to login...';
                            successDiv.classList.remove('hidden');
                            
                            document.getElementById('registerForm').reset();
                            
                            setTimeout(() => {
                                window.location.href = '/login';
                            }, 2000);
                        } else {
                            const errorDiv = document.getElementById('errorMessage');
                            errorDiv.textContent = data.error || data.message || 'Registration failed. Please try again.';
                            errorDiv.classList.remove('hidden');
                        }
                    } catch (error) {
                        const errorDiv = document.getElementById('errorMessage');
                        errorDiv.textContent = 'Network error: Cannot connect to server. Make sure the application is running on port 8081.';
                        errorDiv.classList.remove('hidden');
                    }
                });
            } else {
                console.error('Form with id "registerForm" not found');
            }
        });
    </script>
</body>
</html>
