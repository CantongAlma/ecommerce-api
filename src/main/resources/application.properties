# ============================================================
# APPLICATION NAME
# ============================================================
spring.application.name=EcommerceApi

# ============================================================
# DATABASE CONFIGURATION
# ============================================================

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/ecommercedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA/HIBERNATE CONFIGURATION
# ============================================================

# Hibernate ddl-auto: update (creates/updates tables automatically)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true

# Format SQL for better readability
spring.jpa.properties.hibernate.format_sql=true

# SQL Dialect for MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

#spring.datasource.initialization-mode=never
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

spring.sql.init.data-locations=classpath:data.sql

# ============================================================
# PERFORMANCE OPTIMIZATIONS
# ============================================================

# Batch operations for better performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# ============================================================
# LOGGING CONFIGURATION (for debugging)
# ============================================================

# Show SQL parameter binding values
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Show JDBC datasource connection details
logging.level.org.springframework.jdbc.datasource=DEBUG

# Optional: Show all SQL statements including queries
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# JACKSON CONFIGURATION (JSON serialization)
# ============================================================

# Don't return null values in JSON response
spring.jackson.default-property-inclusion=non_null

# Format dates in ISO format
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ

# ============================================================
# SERVER CONFIGURATION
# ============================================================

# Server port (default is 8081, change if needed)
server.port=8081

# Context path (optional - uncomment if you want all APIs under a prefix)
# server.servlet.context-path=/api

# ============================================================
# SPRING DATA REST (optional)
# ============================================================

# Disable Spring Data REST if not needed
spring.data.rest.detection-strategy=annotated

# Disable automatic data.sql execution

# Debug logging
logging.level.com.ws101.cantong.EcommerceApi=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

